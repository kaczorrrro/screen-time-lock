<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delayed Hello</title>
<style>
body {
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
font-family: Arial, sans-serif;
font-size: 2rem;
}
#message {
opacity: 0;
transition: opacity 1s ease;
}
#message.show {
opacity: 1;
}
</style>
</head>
<body>
<div id="message">Hello</div>


<script>
setTimeout(() => {
document.getElementById("message").classList.add("show");
}, 30000); // 30 seconds
</script>
</body>
</html>
