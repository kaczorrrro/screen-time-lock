<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delayed Hello</title>
<style>
body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: Arial, sans-serif;
  font-size: 2rem;
  gap: 1rem;
}

#message {
  opacity: 0;
  transition: opacity 1s ease;
}
#message.show {
  opacity: 1;
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div id="location">Tap Start to request current position.</div>
<div id="timer"></div>
<button id="startBtn">Start</button>
<button id="enableBtn" disabled>Enable</button>
<div id="message"></div>

<script>
const timeout = 180;
let remaining = timeout;

const locationEl = document.getElementById("location");
const timerEl = document.getElementById("timer");
const startButtonEl = document.getElementById("startBtn");
const buttonEl = document.getElementById("enableBtn");

let enabled = true;

const allowedLatitude = 52.22301;
const allowedLongitude = 21.01686;
const allowedRadiusMeters = 50;

const SHA256_K = [
  0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
  0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
  0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
  0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
  0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
  0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
  0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
  0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2,
];

const SHA256_INITIAL = [
  0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
  0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19,
];

function rotateRight(value, amount) {
  return (value >>> amount) | (value << (32 - amount));
}

function sha256Hex(asciiInput) {
  const bytes = [];

  for (let i = 0; i < asciiInput.length; i++) {
    bytes.push(asciiInput.charCodeAt(i) & 0xff);
  }

  const bitLength = bytes.length * 8;
  bytes.push(0x80);

  while (bytes.length % 64 !== 56) {
    bytes.push(0);
  }

  for (let i = 7; i >= 0; i--) {
    bytes.push((bitLength / 2 ** (i * 8)) & 0xff);
  }

  const hash = SHA256_INITIAL.slice();
  const words = new Array(64);

  for (let offset = 0; offset < bytes.length; offset += 64) {
    for (let i = 0; i < 16; i++) {
      const wordOffset = offset + i * 4;
      words[i] = (
        (bytes[wordOffset] << 24) |
        (bytes[wordOffset + 1] << 16) |
        (bytes[wordOffset + 2] << 8) |
        bytes[wordOffset + 3]
      ) >>> 0;
    }

    for (let i = 16; i < 64; i++) {
      const s0 = rotateRight(words[i - 15], 7) ^ rotateRight(words[i - 15], 18) ^ (words[i - 15] >>> 3);
      const s1 = rotateRight(words[i - 2], 17) ^ rotateRight(words[i - 2], 19) ^ (words[i - 2] >>> 10);
      words[i] = (words[i - 16] + s0 + words[i - 7] + s1) >>> 0;
    }

    let [a, b, c, d, e, f, g, h] = hash;

    for (let i = 0; i < 64; i++) {
      const s1 = rotateRight(e, 6) ^ rotateRight(e, 11) ^ rotateRight(e, 25);
      const ch = (e & f) ^ (~e & g);
      const temp1 = (h + s1 + ch + SHA256_K[i] + words[i]) >>> 0;
      const s0 = rotateRight(a, 2) ^ rotateRight(a, 13) ^ rotateRight(a, 22);
      const maj = (a & b) ^ (a & c) ^ (b & c);
      const temp2 = (s0 + maj) >>> 0;

      h = g;
      g = f;
      f = e;
      e = (d + temp1) >>> 0;
      d = c;
      c = b;
      b = a;
      a = (temp1 + temp2) >>> 0;
    }

    hash[0] = (hash[0] + a) >>> 0;
    hash[1] = (hash[1] + b) >>> 0;
    hash[2] = (hash[2] + c) >>> 0;
    hash[3] = (hash[3] + d) >>> 0;
    hash[4] = (hash[4] + e) >>> 0;
    hash[5] = (hash[5] + f) >>> 0;
    hash[6] = (hash[6] + g) >>> 0;
    hash[7] = (hash[7] + h) >>> 0;
  }

  return hash.map((value) => value.toString(16).padStart(8, "0")).join("");
}

async function bruteForceSuffix(prefix, targetDigest, suffixLength) {
  let attempts = 0;
  const allowedChars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  const charIndexes = new Array(suffixLength).fill(0);

  while (true) {
    const suffix = charIndexes.map((index) => allowedChars[index]).join("");

    if (sha256Hex(prefix + suffix) === targetDigest) {
      return suffix;
    }

    let position = suffixLength - 1;
    while (position >= 0 && charIndexes[position] === allowedChars.length - 1) {
      charIndexes[position] = 0;
      position--;
    }

    if (position < 0) {
      return null;
    }

    charIndexes[position]++;

    attempts++;
    if (attempts % 4096 === 0) {
      await new Promise((resolve) => setTimeout(resolve, 0));
    }
  }
}

function degreesToRadians(degrees) {
  return degrees * Math.PI / 180;
}

function getDistanceMeters(firstLatitude, firstLongitude, secondLatitude, secondLongitude) {
  const earthRadiusMeters = 6371000;
  const latitudeDelta = degreesToRadians(secondLatitude - firstLatitude);
  const longitudeDelta = degreesToRadians(secondLongitude - firstLongitude);
  const firstLatitudeRadians = degreesToRadians(firstLatitude);
  const secondLatitudeRadians = degreesToRadians(secondLatitude);

  const haversine =
    Math.sin(latitudeDelta / 2) ** 2 +
    Math.cos(firstLatitudeRadians) *
      Math.cos(secondLatitudeRadians) *
      Math.sin(longitudeDelta / 2) ** 2;

  return 2 * earthRadiusMeters * Math.atan2(Math.sqrt(haversine), Math.sqrt(1 - haversine));
}

function expireTimer() {
  timerEl.textContent = "";

  const el = document.getElementById("message");
  el.classList.add("show");

  const prefix = "Wx%8D^dm^FUhAAHo";
  const suffixLength = 4;
  const targetDigest = "d0f043d2f4c3434a75728ba2f6e556ba2dd7e073ff5d313ea2f974cd5b33a683";
  el.textContent = "Brute forcing suffix...";

  bruteForceSuffix(prefix, targetDigest, suffixLength).then((suffix) => {
    el.textContent = suffix === null ? "No matching suffix found." : prefix + suffix;
  });
}

// keep button state in sync
function updateButton() {
  buttonEl.disabled = enabled;
}

buttonEl.addEventListener("click", () => {
  enabled = true;
  updateButton();
});

function showPositionBeforeTimer() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      locationEl.textContent = "Position failed: geolocation is not supported.";
      resolve();
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const { latitude, longitude } = position.coords;
        const distanceMeters = getDistanceMeters(latitude, longitude, allowedLatitude, allowedLongitude);
        const timerSkipped = distanceMeters > allowedRadiusMeters;
        locationEl.textContent = [
          `Position: ${latitude}, ${longitude}`,
          `Distance: ${distanceMeters.toFixed(1)}m`,
          `Timer skipped: ${timerSkipped ? "yes" : "no"}`,
        ].join(" | ");

        if (timerSkipped) {
          remaining = 0;
        }

        resolve();
      },
      (error) => {
        locationEl.textContent = `Position failed: ${error.message} | Timer skipped: no`;
        resolve();
      },
    );
  });
}

function startTimer() {
  if (remaining <= 0) {
    expireTimer();
    return;
  }

  timerEl.textContent = remaining;

  const interval = setInterval(() => {
    if (!enabled) return;

    if (remaining % 10 === 0) {
      enabled = false;
      updateButton();
    }

    remaining--;
    timerEl.textContent = remaining;

    if (remaining <= 0) {
      clearInterval(interval);
      expireTimer();
    }
  }, 1000);
}

updateButton();
startButtonEl.addEventListener("click", () => {
  startButtonEl.disabled = true;
  locationEl.textContent = "Requesting current position...";
  showPositionBeforeTimer().then(startTimer);
});
</script>
</body>
</html>
