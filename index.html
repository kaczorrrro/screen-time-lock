<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delayed Hello</title>
<style>
body {
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
font-family: Arial, sans-serif;
font-size: 2rem;
}
#message {
opacity: 0;
transition: opacity 1s ease;
}
#message.show {
opacity: 1;
}
</style>
</head>
<body>
<div id="timer">30</div>
<div id="message"></div>


<script>
const timeout = 120  
let remaining = timeout;
const timerEl = document.getElementById("timer");


const interval = setInterval(() => {
remaining--;
timerEl.textContent = remaining;
if (remaining <= 0) {
timerEl.textContent = "";
clearInterval(interval);
}
}, 1000);


setTimeout(() => {
const decoded = atob("b3RyNWs2Szk=");
const el = document.getElementById("message");
el.textContent = decoded;
el.classList.add("show");
}, timeout * 1000);
</script>
</body>
</html>
